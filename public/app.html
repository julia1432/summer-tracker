<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Летний трекер ⭐</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#0C447C;--blue-mid:#B5D4F4;
  --pink:#D4537E;--pink-light:#FBEAF0;--pink-dark:#72243E;--pink-mid:#F4C0D1;
  --green:#639922;--green-light:#EAF3DE;--green-dark:#27500A;--green-mid:#C0DD97;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#633806;
  --red-light:#FCEBEB;--red-dark:#791F1F;--red-mid:#F09595;
  --gray-bg:#F7F6F2;--card-bg:#fff;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --radius:14px;--radius-sm:8px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-bg);min-height:100vh;color:var(--text)}
.screen{display:none;padding:16px;max-width:480px;margin:0 auto;padding-bottom:32px}
.screen.active{display:block}
.app-title{text-align:center;font-size:28px;font-weight:700;margin-bottom:4px;padding-top:24px}
.app-sub{text-align:center;font-size:14px;color:var(--text2);margin-bottom:28px}
.profile-btn{display:flex;align-items:center;gap:14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;width:100%;margin-bottom:10px}
.p-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.p-av-vova{background:var(--blue-light)}.p-av-alisa{background:var(--pink-light)}.p-av-parent{background:var(--green-light)}
.p-name{font-size:17px;font-weight:600}.p-hint{font-size:13px;color:var(--text2);margin-top:2px}.p-arrow{margin-left:auto;color:var(--text3);font-size:18px}
.pin-backdrop{background:rgba(0,0,0,0.4);border-radius:var(--radius);padding:24px;margin-bottom:12px;display:none}
.pin-backdrop.show{display:block}
.pin-box{background:var(--card-bg);border-radius:var(--radius);padding:24px 20px;text-align:center}
.pin-title{font-size:16px;font-weight:600;margin-bottom:16px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;background:transparent}
.pin-dot.filled{background:var(--green);border-color:var(--green)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pin-key{padding:14px 0;border-radius:var(--radius-sm);background:var(--gray-bg);border:1px solid var(--border);font-size:20px;font-weight:500;cursor:pointer}
.pin-err{font-size:13px;color:#c0392b;min-height:18px}
.pin-cancel{font-size:13px;color:var(--text2);cursor:pointer;margin-top:8px;display:inline-block}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:14px;cursor:pointer;background:none;border:none;padding:0;margin-bottom:16px}
.child-header{border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.ch-vova{background:var(--blue-light)}.ch-alisa{background:var(--pink-light)}
.ch-left{display:flex;align-items:center;gap:12px}
.ch-name{font-size:20px;font-weight:700}
.ch-name-vova{color:var(--blue-dark)}.ch-name-alisa{color:var(--pink-dark)}
.ch-date{font-size:12px;color:var(--text2);margin-top:2px}
.score-pill{border-radius:20px;padding:8px 16px;display:flex;flex-direction:column;align-items:center}
.sp-vova{background:var(--blue-mid)}.sp-alisa{background:var(--pink-mid)}
.sp-num{font-size:24px;font-weight:700;line-height:1}
.sp-num-vova{color:var(--blue-dark)}.sp-num-alisa{color:var(--pink-dark)}
.sp-lbl{font-size:11px;margin-top:1px}
.sp-lbl-vova{color:#185FA5}.sp-lbl-alisa{color:var(--pink)}
.day-strip{display:flex;gap:4px;margin-bottom:12px}
.day-pill{flex:1;text-align:center;padding:6px 2px;border-radius:var(--radius-sm);font-size:11px;border:1px solid var(--border);background:var(--card-bg);color:var(--text2)}
.day-pill .dp-num{font-size:13px;font-weight:600;margin-top:2px}
.dp-today-vova{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue-dark)}
.dp-today-alisa{background:var(--pink-light);border-color:var(--pink-mid);color:var(--pink-dark)}
.dp-done{background:var(--green-light);border-color:var(--green-mid);color:var(--green-dark)}
.week-banner{border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px}
.wb-vova{background:var(--green-light);color:var(--green-dark)}.wb-alisa{background:var(--pink-light);color:var(--pink-dark)}.wb-bonus{background:var(--amber-light);color:var(--amber-dark)}
.sec-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:4px}
.task-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.task-card.done{border-color:#97C459}.task-card.cancelled{opacity:.4}
.task-check{width:32px;height:32px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;background:transparent}
.task-check.ch-vova-done{background:var(--blue);border-color:var(--blue);color:#fff}
.task-check.ch-alisa-done{background:var(--pink);border-color:var(--pink);color:#fff}
.task-check.ch-pending{border-color:#FAC775}
.task-info{flex:1;min-width:0}
.task-name{font-size:15px;font-weight:500}.task-meta{font-size:12px;color:var(--text2);margin-top:2px}
.task-pts{font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0}
.tp-vova{background:var(--blue-light);color:var(--blue-dark)}.tp-alisa{background:var(--pink-light);color:var(--pink-dark)}.tp-done{background:var(--green-light);color:var(--green-dark)}
.shop-section{margin-top:20px}
.shop-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.shop-emoji{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.shop-info{flex:1;min-width:0}
.shop-name{font-size:15px;font-weight:500}.shop-cost{font-size:13px;color:var(--text2);margin-top:2px}
.want-btn{font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;border:none;cursor:pointer}
.want-btn-vova{background:var(--blue);color:#fff}.want-btn-alisa{background:var(--pink);color:#fff}
.want-btn:disabled{opacity:.4;cursor:not-allowed}
.want-btn.sent{background:var(--green-light);color:var(--green-dark)}
.request-badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--amber-light);color:var(--amber-dark);margin-top:4px;display:inline-block}
.parent-header{background:var(--green-light);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.parent-title{font-size:18px;font-weight:700;color:var(--green-dark)}
.parent-date{font-size:12px;color:var(--green);margin-top:2px}
.parent-child{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.pch-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pch-h-vova{background:var(--blue-light)}.pch-h-alisa{background:var(--pink-light)}
.pch-name{font-size:16px;font-weight:700}
.pch-name-vova{color:var(--blue-dark)}.pch-name-alisa{color:var(--pink-dark)}
.pch-score{font-size:20px;font-weight:700}
.pch-score-vova{color:var(--blue-dark)}.pch-score-alisa{color:var(--pink-dark)}
.pch-score-lbl{font-size:11px;color:var(--text2)}
.p-task-row{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.p-status{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ps-done{background:var(--green-light);color:var(--green-dark)}.ps-pending{background:var(--amber-light);color:var(--amber-dark)}
.ps-cancelled{background:#f0f0ec;color:var(--text3)}.ps-missed{background:var(--red-light);color:var(--red-dark)}
.p-task-name{flex:1;font-size:14px}
.p-task-name.strike{color:var(--text3);text-decoration:line-through}
.p-actions{display:flex;gap:6px;flex-shrink:0}
.p-btn{font-size:12px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#f5f4f0;cursor:pointer;font-weight:500}
.p-btn.approve{background:var(--green-light);border-color:#97C459;color:var(--green-dark)}
.p-btn.cancel{background:var(--red-light);border-color:var(--red-mid);color:var(--red-dark)}
.p-btn.restore{background:var(--amber-light);border-color:#FAC775;color:var(--amber-dark)}
.p-bonus-row{padding:10px 16px;border-top:1px solid var(--border);background:var(--amber-light);display:flex;align-items:center;gap:10px}
.p-bonus-text{flex:1;font-size:14px;color:var(--amber-dark);font-weight:500}
.p-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.p-sec-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.p-sec-title i{font-size:18px;color:var(--text2)}
.p-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.p-row input,.p-row select{font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--gray-bg);color:var(--text)}
.p-row input[type=text]{flex:1;min-width:0}.p-row input[type=number]{width:80px}
.p-action-btn{font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;white-space:nowrap}
.btn-green{background:var(--green-light);color:var(--green-dark);border:1px solid #97C459}
.btn-amber{background:var(--amber-light);color:var(--amber-dark);border:1px solid #FAC775}
.msg{font-size:12px;min-height:16px;margin-top:4px}
.msg.ok{color:#3B6D11}.msg.err{color:#A32D2D}
.shop-admin-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.shop-admin-item:last-child{border-bottom:none}
.shop-admin-emoji{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.shop-admin-name{flex:1;font-size:14px}
.shop-admin-cost{font-size:13px;font-weight:600;color:var(--text2);margin-right:4px}
.shop-edit-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px;background:var(--gray-bg);border-radius:var(--radius-sm);margin-bottom:8px}
.shop-edit-row input{font-size:13px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text)}
.shop-edit-row input[type=text]{flex:1;min-width:80px}.shop-edit-row input[type=number]{width:70px}
.emoji-input{width:54px!important;text-align:center;font-size:18px!important}
.req-card{background:var(--amber-light);border:1px solid #FAC775;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.req-who{font-size:20px}.req-info{flex:1}
.req-name{font-size:14px;font-weight:600;color:var(--amber-dark)}
.req-meta{font-size:12px;color:var(--amber)}
.days-picker{display:flex;gap:4px;flex-wrap:wrap}
.day-toggle{padding:5px 9px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--gray-bg);cursor:pointer;color:var(--text2)}
.day-toggle.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tabs{display:flex;gap:0;background:var(--gray-bg);border-radius:var(--radius-sm);padding:3px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--text2)}
.tab.active{background:var(--card-bg);color:var(--text)}
.spinner{text-align:center;padding:40px;color:var(--text2);font-size:14px}
@media(prefers-color-scheme:dark){
  :root{--gray-bg:#1a1a1a;--card-bg:#252525;--border:rgba(255,255,255,0.1);--text:#f0f0f0;--text2:#aaa;--text3:#666}
  .pin-key{background:#333}
  .p-row input,.p-row select{background:#333}
  .shop-edit-row{background:#333}
  .shop-edit-row input{background:#444}
}
</style>
</head>
<body>

<div id="screen-profiles" class="screen active">
  <div class="app-title">Летний трекер ⭐</div>
  <div class="app-sub">Кто ты сегодня?</div>
  <button class="profile-btn" onclick="openChild('vova')">
    <div class="p-avatar p-av-vova">🚀</div>
    <div><div class="p-name">Вова</div><div class="p-hint">9 лет · мои задания</div></div>
    <i class="ti ti-chevron-right p-arrow"></i>
  </button>
  <button class="profile-btn" onclick="openChild('alisa')">
    <div class="p-avatar p-av-alisa">🌸</div>
    <div><div class="p-name">Алиса</div><div class="p-hint">7 лет · мои задания</div></div>
    <i class="ti ti-chevron-right p-arrow"></i>
  </button>
  <button class="profile-btn" onclick="showPin()">
    <div class="p-avatar p-av-parent">🔑</div>
    <div><div class="p-name">Родитель</div><div class="p-hint">управление и проверка</div></div>
    <i class="ti ti-chevron-right p-arrow"></i>
  </button>
  <div class="pin-backdrop" id="pin-backdrop">
    <div class="pin-box">
      <div class="pin-title">Введи PIN-код</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-grid">
        <button class="pin-key" onclick="pin('1')">1</button><button class="pin-key" onclick="pin('2')">2</button><button class="pin-key" onclick="pin('3')">3</button>
        <button class="pin-key" onclick="pin('4')">4</button><button class="pin-key" onclick="pin('5')">5</button><button class="pin-key" onclick="pin('6')">6</button>
        <button class="pin-key" onclick="pin('7')">7</button><button class="pin-key" onclick="pin('8')">8</button><button class="pin-key" onclick="pin('9')">9</button>
        <button class="pin-key" onclick="pin('del')">⌫</button><button class="pin-key" onclick="pin('0')">0</button><button class="pin-key" onclick="pin('del')">⌫</button>
      </div>
      <div class="pin-err" id="pin-err"></div>
      <span class="pin-cancel" onclick="hidePin()">Отмена</span>
    </div>
  </div>
</div>

<div id="screen-child" class="screen">
  <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i> Сменить профиль</button>
  <div class="child-header" id="ch-header">
    <div class="ch-left">
      <div class="p-avatar" id="ch-avatar"></div>
      <div><div class="ch-name" id="ch-name"></div><div class="ch-date" id="ch-date"></div></div>
    </div>
    <div class="score-pill" id="ch-score-pill">
      <div class="sp-num" id="ch-score-num">0</div>
      <div class="sp-lbl" id="ch-score-lbl">баллов</div>
    </div>
  </div>
  <div class="day-strip" id="ch-days"></div>
  <div class="week-banner" id="ch-week-banner"></div>
  <div class="sec-label">Задания на сегодня</div>
  <div id="ch-tasks"></div>
  <div class="shop-section">
    <div class="sec-label">Магазин призов 🎁</div>
    <div id="ch-shop"></div>
  </div>
</div>

<div id="screen-parent" class="screen">
  <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i> Назад</button>
  <div class="parent-header">
    <div class="parent-title">Панель родителя 🔑</div>
    <div class="parent-date" id="p-date"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="pTab('tasks',this)">Задания</div>
    <div class="tab" onclick="pTab('shop',this)">Магазин</div>
    <div class="tab" onclick="pTab('settings',this)">Настройки</div>
  </div>
  <div id="ptab-tasks"><div id="p-children"></div></div>
  <div id="ptab-shop" style="display:none">
    <div class="p-section">
      <div class="p-sec-title"><i class="ti ti-bell"></i>Запросы на призы</div>
      <div id="p-requests"><div style="font-size:13px;color:var(--text2)">Нет новых запросов</div></div>
    </div>
    <div class="p-section">
      <div class="p-sec-title"><i class="ti ti-building-store"></i>Список призов</div>
      <div id="p-shop-list"></div>
      <div style="margin-top:12px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">Добавить приз</div>
        <div class="shop-edit-row">
          <input type="text" class="emoji-input" id="new-shop-emoji" value="🎁">
          <input type="text" id="new-shop-name" placeholder="Название приза">
          <input type="number" id="new-shop-cost" placeholder="баллы" min="1">
          <button class="p-action-btn btn-green" onclick="addShopItem()">Добавить</button>
        </div>
        <div class="msg" id="add-shop-msg"></div>
      </div>
    </div>
    <div class="p-section">
      <div class="p-sec-title"><i class="ti ti-coin"></i>Списать баллы вручную</div>
      <div class="p-row">
        <select id="spend-who"><option value="vova">Вова</option><option value="alisa">Алиса</option></select>
        <input type="number" id="spend-amt" placeholder="баллы" min="1">
        <button class="p-action-btn btn-amber" onclick="spendPoints()">Списать</button>
      </div>
      <div class="msg" id="spend-msg"></div>
    </div>
  </div>
  <div id="ptab-settings" style="display:none">
    <div class="p-section">
      <div class="p-sec-title"><i class="ti ti-plus"></i>Добавить задание</div>
      <div class="p-row">
        <select id="new-task-who"><option value="vova">Вова</option><option value="alisa">Алиса</option><option value="both">Оба</option></select>
        <input type="text" id="new-task-name" placeholder="Название задания">
      </div>
      <div class="p-row">
        <input type="number" id="new-task-pts" placeholder="баллы" value="20">
        <select id="new-task-freq" onchange="freqChange()">
          <option value="daily">каждый день</option>
          <option value="chosen_days">выбрать дни</option>
        </select>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
          <input type="checkbox" id="new-task-cancel"> отменяемое
        </label>
      </div>
      <div id="days-picker-wrap" style="display:none;margin-bottom:8px">
        <div class="days-picker" id="days-picker">
          <span class="day-toggle" data-d="1">Пн</span><span class="day-toggle" data-d="2">Вт</span>
          <span class="day-toggle" data-d="3">Ср</span><span class="day-toggle" data-d="4">Чт</span>
          <span class="day-toggle" data-d="5">Пт</span><span class="day-toggle" data-d="6">Сб</span>
          <span class="day-toggle" data-d="0">Вс</span>
        </div>
      </div>
      <button class="p-action-btn btn-green" style="width:100%" onclick="addTask()">Добавить задание</button>
      <div class="msg" id="add-task-msg"></div>
    </div>
    <div class="p-section">
      <div class="p-sec-title"><i class="ti ti-list"></i>Все задания</div>
      <div id="p-all-tasks"></div>
    </div>
  </div>
</div>

<script>
const SURL='https://ejgakvoxkdpdpfrvfeiy.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqZ2Frdm94a2RwZHBmcnZmZWl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDg0NDcsImV4cCI6MjA5NjIyNDQ0N30.09RJtYUNDhvFRIfxi7vXmSYi-Bp7SggdNWi2KkFbkdM';

async function q(path,method,body){
  const h={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Accept':'application/json'};
  if(method==='GET'||!method) h['Accept']='application/json';
  const r=await fetch(SURL+'/rest/v1/'+path,{method:method||'GET',headers:h,body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();console.error(path,r.status,e);return null;}
  const t=await r.text();
  return t?JSON.parse(t):[];
}

const PIN='1234';
let pinVal='';
let currentWho=null;
const TODAY=new Date().toISOString().slice(0,10);
const DAYS_RU=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function fmtDate(d){const dt=new Date(d+'T12:00:00');return dt.getDate()+' '+MONTHS[dt.getMonth()]+', '+DAYS_RU[dt.getDay()];}
function getWeekDates(){
  const today=new Date(TODAY+'T12:00:00');
  const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-((dow===0?7:dow)-1));
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.toISOString().slice(0,10));}
  return dates;
}
function getWeekStart(){return getWeekDates()[0];}
function isTaskActive(task,dateStr){
  const dow=new Date(dateStr+'T12:00:00').getDay();
  if(task.freq==='daily')return true;
  if(task.freq==='chosen_days')return(task.days||'').split(',').map(Number).includes(dow);
  return true;
}
function freqLabel(t){
  if(t.freq==='daily')return'Каждый день';
  if(t.freq==='chosen_days'){const dm={0:'Вс',1:'Пн',2:'Вт',3:'Ср',4:'Чт',5:'Пт',6:'Сб'};return(t.days||'').split(',').map(d=>dm[d]).join(', ');}
  return'';
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){show('screen-profiles');}
function showPin(){pinVal='';updateDots();document.getElementById('pin-err').textContent='';document.getElementById('pin-backdrop').classList.add('show');}
function hidePin(){document.getElementById('pin-backdrop').classList.remove('show');}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).className='pin-dot'+(i<pinVal.length?' filled':'');}
function pin(v){
  if(v==='del'){pinVal=pinVal.slice(0,-1);updateDots();return;}
  if(pinVal.length>=4)return;
  pinVal+=v;updateDots();
  if(pinVal.length===4){
    if(pinVal===PIN){hidePin();openParent();}
    else{document.getElementById('pin-err').textContent='Неверный PIN';pinVal='';updateDots();}
  }
}

async function refreshChild(who){
  const tasks=await q('tasks?select=*&who=eq.'+who+'&order=sort_order');
  const scoreArr=await q('scores?select=points&who=eq.'+who);
  const recs=await q('daily_records?select=task_id,status&date=eq.'+TODAY+'&who=eq.'+who);
  const shopItems=await q('shop_items?select=*&order=sort_order');
  const myReqs=await q('shop_requests?select=*&who=eq.'+who+'&status=eq.pending');
  const score=scoreArr&&scoreArr[0]?scoreArr[0].points:0;
  const recMap={};(recs||[]).forEach(r=>recMap[r.task_id]=r.status);
  const todayTasks=(tasks||[]).filter(t=>isTaskActive(t,TODAY));
  const weekDates=getWeekDates();
  const allRecs=await q('daily_records?select=date,task_id,status&who=eq.'+who+'&date=gte.'+weekDates[0]+'&date=lte.'+weekDates[6]);
  const weekData={};
  weekDates.forEach(wd=>{
    const rm={};(allRecs||[]).filter(r=>r.date===wd).forEach(r=>rm[r.task_id]=r.status);
    const dt=(tasks||[]).filter(t=>isTaskActive(t,wd));
    weekData[wd]={allDone:dt.every(t=>rm[t.id]==='approved'||rm[t.id]==='cancelled')};
  });
  document.getElementById('ch-score-num').textContent=score;
  renderDayStrip(who,weekDates,weekData);
  renderWeekBanner(who,todayTasks,recMap);
  renderChildTasks(who,todayTasks,recMap);
  renderChildShop(who,shopItems||[],score,myReqs||[]);
}

function renderDayStrip(who,weekDates,weekData){
  const strip=document.getElementById('ch-days');strip.innerHTML='';
  const today=new Date(TODAY+'T12:00:00');
  weekDates.forEach(wd=>{
    const d=new Date(wd+'T12:00:00');const isToday=wd===TODAY;
    const pill=document.createElement('div');
    let cls='day-pill';
    if(isToday)cls+=' dp-today-'+who;
    else if(weekData[wd]&&weekData[wd].allDone&&d<today)cls+=' dp-done';
    pill.className=cls;
    pill.innerHTML='<div>'+DAYS_RU[d.getDay()]+'</div><div class="dp-num">'+d.getDate()+'</div>';
    strip.appendChild(pill);
  });
}

async function deleteTask(id){if(!confirm('Удалить задание?'))return;await q('tasks?id=eq.'+id,'DELETE');await refreshParent();}
function freqChange(){document.getElementById('days-picker-wrap').style.display=document.getElementById('new-task-freq').value==='chosen_days'?'block':'none';}
document.querySelectorAll('.day-toggle').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('on')));
function pTab(tab,el){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['tasks','shop','settings'].forEach(t=>document.getElementById('ptab-'+t).style.display=t===tab?'block':'none');
}
</script>
</body>
